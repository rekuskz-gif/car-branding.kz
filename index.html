<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Катя — AI консультант</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Georgia, serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .chat { width: 100%; max-width: 680px; background: rgba(255,255,255,0.05); border-radius: 24px; overflow: hidden; display: flex; flex-direction: column; height: 85vh; box-shadow: 0 8px 32px rgba(167,139,250,0.2); }
    .header { padding: 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); }
    .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #a78bfa; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .header-info { flex: 1; }
    .name { color: white; font-weight: bold; font-size: 16px; }
    .status { color: #a78bfa; font-size: 12px; margin-top: 2px; }
    .header-brand { color: rgba(255,255,255,0.4); font-size: 12px; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius: 4px; }
    .msg { max-width: 75%; padding: 12px 16px; border-radius: 16px; color: white; white-space: pre-wrap; line-height: 1.6; word-break: break-word; font-size: 14px; }
    .user { align-self: flex-end; background: linear-gradient(135deg, #7c3aed, #4f46e5); border-radius: 18px 18px 4px 18px; }
    .bot { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px 18px 18px 4px; }
    .msg a { color: #a78bfa; text-decoration: underline; }
    .cursor { display: inline-block; width: 2px; height: 1.2em; background: #a78bfa; margin-left: 2px; animation: blink 0.7s infinite; vertical-align: text-bottom; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 12px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px 18px 18px 4px; width: fit-content; }
    .typing-dot { width: 7px; height: 7px; background: #a78bfa; border-radius: 50%; animation: typing 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }
    .input-area { display: flex; gap: 10px; padding: 16px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); }
    textarea { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 10px 14px; color: white; font-size: 15px; resize: none; outline: none; font-family: inherit; min-height: 44px; max-height: 120px; }
    textarea::placeholder { color: rgba(255,255,255,0.3); }
    textarea:focus { border-color: rgba(167,139,250,0.5); }
    button { width: 46px; height: 46px; border: none; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #4f46e5); color: white; cursor: pointer; font-size: 20px; flex-shrink: 0; transition: transform 0.2s, opacity 0.2s; }
    button:hover:not(:disabled) { transform: scale(1.05); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat">
    <div class="header">
      <div class="avatar">
        <img src="https://raw.githubusercontent.com/rekuskz-gif/amina-ai/main/amina-icon.png" alt="Катя">
      </div>
      <div class="header-info">
        <div class="name">Катя</div>
        <div class="status">🟢 онлайн</div>
      </div>
      <div class="header-brand">car-branding.kz</div>
    </div>
    <div id="messages" class="messages"></div>
    <div class="input-area">
      <textarea id="input" placeholder="Напишите сообщение..." rows="1"></textarea>
      <button onclick="send()" id="sendBtn">↑</button>
    </div>
  </div>

  <script>
    let history = [];
    let loading = false;

    function linkify(text) {
      return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
    }

    function addMessage(role, text) {
      const msg = document.createElement("div");
      msg.className = "msg " + role;
      msg.innerHTML = linkify(text);
      document.getElementById("messages").appendChild(msg);
      scrollToBottom();
    }

    function showTyping() {
      const el = document.createElement("div");
      el.id = "typing";
      el.className = "typing-indicator";
      el.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      document.getElementById("messages").appendChild(el);
      scrollToBottom();
    }

    function hideTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    function scrollToBottom() {
      const m = document.getElementById("messages");
      m.scrollTop = m.scrollHeight;
    }

    async function typeMessage(text) {
      const msg = document.createElement("div");
      msg.className = "msg bot";
      const content = document.createElement("span");
      msg.appendChild(content);
      document.getElementById("messages").appendChild(msg);

      for (let i = 0; i < text.length; i++) {
        content.textContent += text[i];
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        msg.appendChild(cursor);
        await new Promise(r => setTimeout(r, 18));
        scrollToBottom();
        cursor.remove();
      }
      content.innerHTML = linkify(content.textContent);
    }

    async function send() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text || loading) return;

      loading = true;
      document.getElementById("sendBtn").disabled = true;
      input.value = "";
      input.style.height = "auto";

      addMessage("user", text);
      history.push({ role: "user", content: text });
      showTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history })
        });
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || "Ошибка";
        hideTyping();
        history.push({ role: "assistant", content: reply });
        await typeMessage(reply);
      } catch (e) {
        hideTyping();
        addMessage("bot", "Ошибка соединения. Попробуйте ещё раз.");
      }

      loading = false;
      document.getElementById("sendBtn").disabled = false;
      input.focus();
    }

    document.getElementById("input").addEventListener("input", function() {
      this.style.height = "auto";
      this.style.height = Math.min(this.scrollHeight, 120) + "px";
    });

    document.getElementById("input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    window.addEventListener("load", () => {
      setTimeout(() => {
        typeMessage("Здравствуйте! Я Катя, AI консультант car-branding.kz. Чем могу помочь?");
      }, 500);
    });
  </script>
</body>
</html>
